# Portainer deployment via GitHub Container Registry
# 1. GitHub Actions builds the image and pushes to ghcr.io
# 2. In Portainer: Stacks → Add Stack → "Repository" build method
# 3. Set all environment variables in the Portainer stack env editor
# 4. Host nginx proxies commit.kunjdeveloper.me → 127.0.0.1:3000

services:
  app:
    image: ghcr.io/kunjhirapara/commit:${IMAGE_TAG:-latest}
    container_name: commit
    restart: unless-stopped
    ports:
      - "127.0.0.1:3000:3000"
    environment:
      NODE_ENV: production

      # Clerk — authentication
      NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY: ${NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY}
      CLERK_SECRET_KEY: ${CLERK_SECRET_KEY}
      CLERK_WEBHOOK_SECRET: ${CLERK_WEBHOOK_SECRET}

      # Convex — backend / database
      NEXT_PUBLIC_CONVEX_URL: ${NEXT_PUBLIC_CONVEX_URL}
      CONVEX_DEPLOYMENT: ${CONVEX_DEPLOYMENT}

      # Stream — video / realtime
      NEXT_PUBLIC_STREAM_API_KEY: ${NEXT_PUBLIC_STREAM_API_KEY}
      STREAM_SECRET_KEY: ${STREAM_SECRET_KEY}

      # SMTP — email notifications
      SMTP_HOST: ${SMTP_HOST}
      SMTP_PORT: ${SMTP_PORT:-587}
      SMTP_USER: ${SMTP_USER}
      SMTP_PASS: ${SMTP_PASS}
      SMTP_FROM_EMAIL: ${SMTP_FROM_EMAIL}

      # App
      NEXT_PUBLIC_APP_URL: ${NEXT_PUBLIC_APP_URL}
      INTERNAL_API_KEY: ${INTERNAL_API_KEY}

    volumes:
      # Required: app spawns isolated Docker containers for code execution
      - /var/run/docker.sock:/var/run/docker.sock

    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:3000/api/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

  backup:
    image: ghcr.io/kunjhirapara/commit:${IMAGE_TAG:-latest}
    container_name: commit-backup
    restart: unless-stopped
    working_dir: /app/backup-worker
    command: ["node", "--experimental-strip-types", "scripts/backup-job.ts"]
    environment:
      NODE_ENV: production

      # Convex CLI — needs deploy key for non-interactive `convex export`
      CONVEX_DEPLOYMENT: ${CONVEX_DEPLOYMENT}
      CONVEX_DEPLOY_KEY: ${CONVEX_DEPLOY_KEY}

      # Snapshot reporting back into the app's reliability dashboard
      NEXT_PUBLIC_CONVEX_SITE_URL: ${NEXT_PUBLIC_CONVEX_SITE_URL}
      INTERNAL_API_KEY: ${INTERNAL_API_KEY}

      # Schedule / retention (override via Portainer env if needed)
      BACKUP_DIR: /data/backups
      BACKUP_CRON: ${BACKUP_CRON:-0 0 * * *}
      BACKUP_TZ: ${BACKUP_TZ:-UTC}
      BACKUP_RETENTION: ${BACKUP_RETENTION:-14}
      BACKUP_RUN_ON_START: ${BACKUP_RUN_ON_START:-0}

    volumes:
      # Named volume so backups survive stack recreation and image redeploys.
      # Inspect host path with: docker volume inspect commit_backup-data
      - backup-data:/data/backups

volumes:
  backup-data:
